apiVersion: apps/v1
kind: Deployment
metadata:
  name: show-depl
spec:
  replicas: 1
  selector:
    matchLabels:
      app: show
  template:
    metadata:
      labels:
        app: show
    spec:
      containers:
        - name: show-container
          image: adarsh893/book-my-movie-show
          env:
            - name: JWT_KEY
              valueFrom:
                secretKeyRef:
                  name: jwt-secret
                  key: JWT_KEY
            - name: DATABASE_URL
              value: postgresql://postgres:postgres@show-postgres-cluster-ip-srv:5432/show


## cluster ip service
---
apiVersion: v1
kind: Service
metadata:
  name: show-cluster-ip-srv
spec:
  selector:
    app: show
  ports:
    - name: show-port
      protocol: TCP
      port: 3003
      targetPort: 3003
